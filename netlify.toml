[build]
  command = "npm run build"
  publish = ".next"
  
[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Environment variables for production
[context.production.environment]
  META_PIXEL_ID = "771021905629860"
  META_CAPI_ACCESS_TOKEN = "EAAJxIW8ZC3KsBRA2FCAeMLs1BKQcQYmdCRCaVnnTrjZArCKhjNxDnbJUuvIeTKKvjRzjRwGS3l0cmZBKIYEQKBGZCIcZC5PI0S2mlcZBiS3HEBrZAJBRNP7WRCQYPEa7jEpPTRuf4YytZCcFy1c92naIbZAH5Y076YX13IvcjzFhptqJVRvc0ouerFXYDe2uR7v7ZCygZDZD"
  NEXT_PUBLIC_GA_MEASUREMENT_ID = "G-V9C14XZ9SG"

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# /1ai → /one-ai (301)
[[redirects]]
  from = "/id/1ai"
  to = "/id/one-ai"
  status = 301
  force = true

[[redirects]]
  from = "/en/1ai"
  to = "/en/one-ai"
  status = 301
  force = true

# OmniRoute → one-ai (301 permanent, SEO-safe)
[[redirects]]
  from = "/id/omniroute"
  to = "/id/one-ai"
  status = 301
  force = true

[[redirects]]
  from = "/en/omniroute"
  to = "/en/one-ai"
  status = 301
  force = true

[[redirects]]
  from = "/omniroute"
  to = "/id/one-ai"
  status = 301
  force = true
