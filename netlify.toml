[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects: OmniRoute → 1Ai (301 permanent)
[[redirects]]
  from = "/id/omniroute"
  to = "/id/1ai"
  status = 301
  force = true

[[redirects]]
  from = "/en/omniroute"
  to = "/en/1ai"
  status = 301
  force = true

[[redirects]]
  from = "/omniroute"
  to = "/id/1ai"
  status = 301
  force = true
