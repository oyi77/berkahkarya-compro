<script>
(function() {
  var ham = document.getElementById('bk-hamburger');
  var menu = document.getElementById('bk-mobile-menu');
  if (ham && menu) {
    ham.addEventListener('click', function() { menu.classList.toggle('open'); });
    menu.querySelectorAll('.bk-mobile-link').forEach(function(l) {
      l.addEventListener('click', function() { menu.classList.remove('open'); });
    });
  }
  // Mark active page
  var page = document.body.getAttribute('data-page');
  if (page) {
    document.querySelectorAll('.bk-nav-link[data-page="'+page+'"]').forEach(function(el) {
      el.classList.add('active');
    });
  }
  // Scroll shadow
  window.addEventListener('scroll', function() {
    var nav = document.getElementById('bk-nav');
    if (nav) nav.style.boxShadow = window.scrollY > 10 ? '0 2px 20px rgba(0,0,0,0.4)' : 'none';
  });
})();
</script>
