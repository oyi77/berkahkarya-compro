<section id="contact" class="py-5 content-section bg-light">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="contact-form-container">
                    <div class="section-header text-center">
                        <span class="section-badge"><i class="fas fa-envelope"></i> Hubungi Kami</span>
                        <h2 class="section-title">Mulai Transformasi Digital Anda</h2>
                        <p class="section-subtitle">Konsultasi gratis untuk strategi pertumbuhan bisnis Anda</p>
                    </div>
                    
                    <form id="contactForm" class="needs-validation" novalidate>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="name" class="form-label">Nama Lengkap</label>
                                <input type="text" class="form-control" id="name" required>
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="col-12">
                                <label for="subject" class="form-label">Topik</label>
                                <select class="form-select" id="subject">
                                    <option value="tiktok">TikTok Content Agency (3 Free Videos)</option>
                                    <option value="seo">E-commerce Optimization</option>
                                    <option value="trading">FlashRobs Trading Bot</option>
                                    <option value="other">Lainnya</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label for="message" class="form-label">Pesan</label>
                                <textarea class="form-control" id="message" rows="5" required placeholder="Ceritakan tentang bisnis Anda..."></textarea>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary w-100 py-3">
                                    <i class="fas fa-paper-plane"></i> Kirim Pesan
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
